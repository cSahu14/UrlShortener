name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: dotnet publish UrlShortener.csproj -c Release -r linux-x64 --self-contained false -o ./publish

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload to S3
      run: |
        zip -r deploy.zip ./publish
        aws s3 cp deploy.zip s3://${{ secrets.S3_BUCKET }}/deploy.zip

    - name: Deploy via SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws s3 cp s3://${{ secrets.S3_BUCKET }}/deploy.zip /home/ubuntu/deploy.zip --region ${{ secrets.AWS_REGION }}",
            "cd /home/ubuntu && unzip -o deploy.zip -d app",
            "pkill -f UrlShortener || true",
            "nohup dotnet /home/ubuntu/app/publish/UrlShortener.dll > /home/ubuntu/app.log 2>&1 &"
          ]' \
          --region ${{ secrets.AWS_REGION }}
